<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Hopper | PixelPlay</title>
    <style>
      :root { color-scheme: dark; --bg:#050816; --panel:#0e1427; --text:#f4f7ff; --muted:#98a6c8; --accent:#72f2b8; }
      * { box-sizing: border-box; }
      body { margin:0; font-family:Inter, system-ui, sans-serif; background:radial-gradient(circle at top left, rgba(56,189,248,0.2), transparent 20%), linear-gradient(135deg,#050816,#0d1326); color:var(--text); min-height:100vh; display:grid; place-items:center; padding:24px; }
      .card { width:min(760px,100%); padding:30px; border-radius:28px; background:var(--panel); border:1px solid rgba(255,255,255,0.08); box-shadow:0 20px 60px rgba(0,0,0,0.35); }
      h1 { margin:0 0 10px; font-size:2rem; }
      p { color:var(--muted); line-height:1.6; }
      a { display:inline-flex; margin-top:12px; padding:12px 16px; border-radius:999px; background:linear-gradient(135deg,var(--accent),#2ac0ff); color:#03131d; text-decoration:none; font-weight:700; }
    </style>
  </head>
  <body>
    <div class="card">
      <h1>Sky Hopper</h1>
      <p>Leap across cloud platforms, collect power-ups, and chase the highest score in the sky.</p>
      <a href="../../index.html">Back to homepage</a>
    </div>
  </body>
</html>
