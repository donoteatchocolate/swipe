<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sky Hopper</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #05111f;
        --panel: rgba(8, 20, 39, 0.9);
        --text: #f5f9ff;
        --muted: #9fb0cc;
        --accent: #38bdf8;
      }
      * { box-sizing: border-box; }
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: Inter, system-ui, sans-serif;
        background: radial-gradient(circle at top, #18314d 0%, var(--bg) 55%, #02050b 100%);
        color: var(--text);
      }
      .card {
        width: min(720px, 100%);
        padding: 28px;
        border-radius: 24px;
        background: var(--panel);
        border: 1px solid rgba(255,255,255,0.08);
        box-shadow: 0 24px 80px rgba(0,0,0,0.35);
      }
      h1 { margin: 0 0 10px; font-size: 2rem; }
      p { color: var(--muted); line-height: 1.6; }
      .actions { display: flex; gap: 12px; flex-wrap: wrap; margin-top: 18px; }
      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 10px 14px;
        border-radius: 999px;
        background: linear-gradient(135deg, var(--accent), #14b8a6);
        color: #03131d;
        text-decoration: none;
        font-weight: 700;
      }
      .menu-btn {
        position: fixed;
        left: 12px;
        top: 12px;
        z-index: 20;
        background: rgba(2, 8, 23, 0.8);
        color: var(--text);
        border: 1px solid rgba(255,255,255,0.1);
        backdrop-filter: blur(8px);
      }
    </style>
  </head>
  <body>
    <a href="../../index.html" class="menu-btn">↩ Menu</a>
    <div class="card">
      <h1>Sky Hopper</h1>
      <p>This game page is ready to be wired up with your full Sky Hopper experience. Until then, this placeholder keeps the play link working and the menu button available.</p>
      <div class="actions">
        <a href="../../index.html">Back to home</a>
      </div>
    </div>
  </body>
</html>
