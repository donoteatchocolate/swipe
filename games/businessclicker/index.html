        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        @keyframes floatUpAndFade {
            0% { opacity: 1; transform: translateY(0) scale(1); }
            100% { opacity: 0; transform: translateY(-100px) scale(1.2); }
        }
        
        .animate-float {
            animation: floatUpAndFade 1s cubic-bezier(0.2, 0.8, 0.2, 1) forwards;
        }

        @keyframes toastIn {
            0% { transform: translateY(100px) scale(0.9); opacity: 0; }
            100% { transform: translateY(0) scale(1); opacity: 1; }
        }
        .animate-toast {
            animation: toastIn 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
        }

        @keyframes goldenFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-10vh) rotate(360deg); opacity: 0; }
        }
        .animate-golden {
            animation: goldenFloat 8s linear forwards;
        }
        
        .glass-panel {
            background: rgba(30, 41, 59, 0.7);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        
        /* Custom scrollbar styling */
        .custom-scrollbar::-webkit-scrollbar {
            width: 6px;
        }
        .custom-scrollbar::-webkit-scrollbar-track {
            background: rgba(15, 23, 42, 0.3);
        }
        .custom-scrollbar::-webkit-scrollbar-thumb {
            background: rgba(16, 185, 129, 0.2);
            border-radius: 9999px;
        }
        .custom-scrollbar::-webkit-scrollbar-thumb:hover {
            background: rgba(16, 185, 129, 0.4);
        }
    </style>

        // --- UTILITIES & GAME MATH ---
        function formatMoney(num) {
            if (num >= 1e12) return `$${(num / 1e12).toFixed(3)}T`;
            if (num >= 1e9) return `$${(num / 1e9).toFixed(3)}B`;
            if (num >= 1e6) return `$${(num / 1e6).toFixed(3)}M`;
            if (num >= 1e3) return `$${(num / 1e3).toFixed(2)}k`;
            return `$${num.toFixed(1)}`;
        }

        function calculateBulkCost(baseCost, count, amount) {
            return baseCost * Math.pow(1.15, count) * (Math.pow(1.15, amount) - 1) / 0.15;
        }

        function calculateBulkRefund(baseCost, count, amount) {
            if (count < amount) return 0;
            return 0.5 * calculateBulkCost(baseCost, count - amount, amount);
        }

        // --- BACKGROUND MUSIC & AUDIO SYNTH SEQUENCE ---
        let audioCtx = null;
        let musicPlaying = false;
        let synthInterval = null;
        
        // Cozy relax chord cycle (Cmaj7 - Am7 - Fmaj7 - G6)
        const musicChords = [
            [261.63, 329.63, 392.00, 493.88], // Cmaj7
            [220.00, 261.63, 329.63, 392.00], // Am7
            [174.61, 220.00, 261.63, 349.23], // Fmaj7
            [196.00, 246.94, 293.66, 392.00]  // G6
        ];
        let currentChordIndex = 0;
        let step = 0;

        function startMusic() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            musicPlaying = true;
            
            let tempo = 120; // 120 Beats Per Minute
            let stepDuration = 60 / tempo / 2; // 0.25 seconds per note step

            let nextNoteTime = audioCtx.currentTime;

            function playStep() {
                if (!musicPlaying) return;
                
                let chord = musicChords[currentChordIndex];
                let noteFreq = chord[step % chord.length];
                
                // Construct a smooth chiptune synthesiser step
                let osc = audioCtx.createOscillator();
                let gainNode = audioCtx.createGain();
                
                osc.type = 'triangle'; // warm cozy sound waves
                osc.frequency.value = noteFreq;
                
                gainNode.gain.setValueAtTime(0, nextNoteTime);
                // Lower default sound volume to be extremely pleasant, quiet and comfortable
                gainNode.gain.linearRampToValueAtTime(0.012, nextNoteTime + 0.05); 
                gainNode.gain.exponentialRampToValueAtTime(0.0001, nextNoteTime + stepDuration * 1.5);
                
                osc.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                
                osc.start(nextNoteTime);
                osc.stop(nextNoteTime + stepDuration * 1.5);
                
                step++;
                if (step % 8 === 0) {
                    currentChordIndex = (currentChordIndex + 1) % musicChords.length;
                }
                
                nextNoteTime += stepDuration;
                
                let delay = (nextNoteTime - audioCtx.currentTime) * 1000;
                synthInterval = setTimeout(playStep, Math.max(0, delay));
            }
            
            playStep();
        }

        function stopMusic() {
            musicPlaying = false;
            clearTimeout(synthInterval);
        }

        // --- SOUND EFFECTS (Sleek procedurally generated Audio) ---
        function playChime() {
            try {
                // Share the same audio context if initiated
                let effectCtx = audioCtx;
                if (!effectCtx) {
                    effectCtx = new (window.AudioContext || window.webkitAudioContext)();
                }
                if (effectCtx.state === 'suspended') {
                    effectCtx.resume();
                }
                
                const osc = effectCtx.createOscillator();
                const gain = effectCtx.createGain();
                
                osc.type = 'sine';
                osc.connect(gain);
                gain.connect(effectCtx.destination);
                
                // Achievement beautiful dual bell chime
                const now = effectCtx.currentTime;
                osc.frequency.setValueAtTime(523.25, now); // C5
                gain.gain.setValueAtTime(0, now);
                gain.gain.linearRampToValueAtTime(0.15, now + 0.05);
                gain.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                
                osc.start(now);
                osc.stop(now + 0.8);

                // High third harmony
                const osc2 = effectCtx.createOscillator();
                const gain2 = effectCtx.createGain();
                osc2.type = 'sine';
                osc2.connect(gain2);
                gain2.connect(effectCtx.destination);
                osc2.frequency.setValueAtTime(659.25, now + 0.08); // E5
                gain2.gain.setValueAtTime(0, now + 0.08);
                gain2.gain.linearRampToValueAtTime(0.1, now + 0.12);
                gain2.gain.exponentialRampToValueAtTime(0.001, now + 0.8);
                osc2.start(now + 0.08);
                osc2.stop(now + 0.8);
            } catch(e) {
                // AudioContext not allowed or not supported; fail silently.
            }
        }

            let pIncome = 0;

            let globalMultiplier = getPrestigeMultiplier();

            businesses.forEach(biz => {
                let bizIncome = biz.baseIncome * biz.count;
                upgrades.forEach(upg => {
                    if (upg.bought && upg.type === 'business' && upg.target === biz.id) {
                        bizIncome *= upg.multiplier;
                    }
                });
                pIncome += bizIncome;
            });

            upgrades.forEach(upg => {
                if (upg.bought && upg.type === 'global') {
                    globalMultiplier *= upg.multiplier;
                }
                if (upg.bought && upg.type === 'click') {
                    cValue *= upg.multiplier;
                }
            });

            return {
                passiveIncome: pIncome * globalMultiplier,
                clickValue: cValue * getPrestigeMultiplier()
            };
        }

                        <div id="biz-card-${index}" class="p-4 rounded-2xl bg-slate-800/20 border border-slate-800 flex items-center justify-center gap-3 text-slate-600 h-24">
                            <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" /></svg>
                            <span class="font-semibold text-sm pointer-events-none">Discover at ${formatMoney(biz.baseCost)}</span>

                    `;
                    return;
                }

                const cost = tradeMode === 'buy' 
                    ? calculateBulkCost(biz.baseCost, biz.count, tradeAmount)
                    : calculateBulkRefund(biz.baseCost, biz.count, tradeAmount);

                html += `
                    <button
                        type="button"
                        data-action="trade"
                        data-index="${index}"
                        id="biz-card-${index}"
                        class="w-full text-left p-4 rounded-2xl border transition-all duration-150 active:scale-[0.98] flex items-center gap-4 select-none bg-slate-900/40 border-slate-800 opacity-40 cursor-default"
                    >
                        <div id="biz-icon-wrap-${index}" class="w-14 h-14 rounded-xl flex items-center justify-center shadow-inner bg-slate-950 pointer-events-none">
                            <svg class="w-7 h-7 ${biz.color} pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                ${biz.icon}
                            </svg>
                        </div>
                        
                        <div class="flex-1 pointer-events-none">
                            <div class="flex justify-between items-start mb-1">
                                <h3 class="font-bold text-base text-slate-400">
                                    ${biz.name}
                                </h3>
                                <div id="biz-count-${index}" class="text-2xl font-black text-slate-700 bg-slate-950 px-3 py-0.5 rounded-lg border border-slate-800/50">
                                    ${biz.count}
                                </div>
                            </div>
                            
                            <div class="flex justify-between items-end mt-2">
                                <span id="biz-cost-${index}" class="font-mono font-bold text-red-400/80">
                                    ${tradeMode === 'buy' ? '-' : '+'}${formatMoney(cost)}

                                <span class="text-xs font-semibold text-slate-400 bg-slate-800 px-2 py-1 rounded">
                                    +${formatMoney(biz.baseIncome)}/s
                                </span>
                            </div>
                        </div>
                    </button>
                `;
            });

            html += '</div>';
            listContainer.innerHTML = html;
        }

        function renderUpgradesTab() {
            let html = '<div class="grid grid-cols-1 gap-3 pb-8">';

            upgrades.forEach((upg, index) => {
                if (upg.bought) {
                    html += `
                        <div class="p-4 rounded-2xl bg-emerald-900/20 border border-emerald-800/30 flex items-center gap-4 opacity-70">
                            <div class="w-12 h-12 rounded-full bg-emerald-900/50 flex items-center justify-center text-emerald-400 pointer-events-none">
                                <svg class="w-6 h-6 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            </div>
                            <div class="pointer-events-none">
                                <h3 class="font-bold text-emerald-100 line-through decoration-emerald-500/50">${upg.name}</h3>
                                <p class="text-xs text-emerald-500 font-medium mt-0.5">${upg.description}</p>
                            </div>
                        </div>
                    `;
                    return;
                }

                const isVisible = money >= (upg.cost * 0.2);
                if (!isVisible) return;

                html += `
                    <button
                        type="button"
                        data-action="upgrade"
                        data-index="${index}"
                        id="upg-card-${index}"
                        class="w-full text-left p-4 rounded-2xl border transition-all duration-150 active:scale-[0.98] flex items-center gap-4 select-none bg-slate-900/40 border-slate-800 opacity-40 cursor-default"
                    >
                        <div id="upg-icon-wrap-${index}" class="w-12 h-12 rounded-full flex items-center justify-center pointer-events-none bg-slate-900">
                            <svg class="w-6 h-6 text-slate-600 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
                                ${upg.iconPath}
                            </svg>
                        </div>
                        
                        <div class="flex-1 pointer-events-none">
                            <h3 class="font-bold text-slate-400">
                                ${upg.name}
                            </h3>
                            <p class="text-xs text-amber-200/70 font-medium mt-0.5 mb-2 leading-tight">
                                ${upg.description}
                            </p>
                            <span id="upg-cost-${index}" class="font-mono font-bold text-sm bg-slate-950/50 px-2 py-1 rounded inline-block text-red-400/80">
                                ${formatMoney(upg.cost)}
                            </span>
                        </div>
                    </button>
                `;
            });

            if (upgrades.every(u => u.bought)) {
                html += `
                    <div class="text-center p-8 text-slate-500 font-medium pointer-events-none">
                        All upgrades bought! Outstanding work!
                    </div>
                `;
            }

            html += '</div>';
            listContainer.innerHTML = html;
        }

        function renderPrestigeTab() {
            const hasEnough = money >= 1000000;
            const boostPercentage = (statPrestigeCount + 1) * 10;
            
            listContainer.innerHTML = `
                <div class="p-6 bg-slate-900/40 border border-slate-850 rounded-2xl space-y-4 shadow-xl">
                    <h3 class="text-xl font-extrabold text-purple-400 flex items-center gap-2">
                        ✨ Reset Reality (Prestige)
                    </h3>
                    <p class="text-xs text-slate-300 leading-relaxed">
                        Prestige forces you to sell all current assets and upgrades, resetting your money back to $10.0 in exchange for permanent cosmic mastery.
                    </p>
                    <div class="bg-slate-950 p-4 rounded-xl space-y-2 border border-slate-850">
                        <div class="flex justify-between text-xs font-semibold">
                            <span class="text-slate-400">Your Prestige Level:</span>
                            <span class="text-white font-bold">${statPrestigeCount}</span>
                        </div>
                        <div class="flex justify-between text-xs font-semibold">
                            <span class="text-slate-400">Current Income Multiplier:</span>
                            <span class="text-amber-400 font-bold">${getPrestigeMultiplier().toFixed(2)}x</span>
                        </div>
                        <div class="flex justify-between text-xs font-semibold">
                            <span class="text-slate-400">Next Level Multiplier:</span>
                            <span class="text-emerald-400 font-bold">${(getPrestigeMultiplier() + 0.1).toFixed(2)}x (+10%)</span>
                        </div>
                    </div>

                    <button 
                        id="btn-trigger-prestige"
                        type="button" 
                        class="w-full py-4 rounded-xl font-bold transition-all flex justify-center items-center gap-2 active:scale-95 ${
                            hasEnough 
                                ? 'bg-gradient-to-r from-purple-600 to-indigo-600 hover:from-purple-500 hover:to-indigo-500 shadow-lg shadow-purple-900/30 text-white cursor-pointer' 
                                : 'bg-slate-950/80 border border-slate-800 text-slate-500 cursor-default'
                        }"
                    >
                        <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24"><path d="M5 3v4M3 5h4M6 17v4M4 19h4m12-4v4m-2-2h4m-12-7h.01M16 8h.01M13 12h.01M21 21M3 21"></path></svg>
                        <span>${hasEnough ? 'PRESTIGE NOW!' : 'Locked (Needs $1.00M)'}</span>
                    </button>
                    ${!hasEnough ? `<p class="text-[10px] text-red-400 font-medium text-center">Generate ${formatMoney(1000000 - money)} more to qualify!</p>` : ''}
                </div>
            `;

            // Setup local click handler for Prestige button
            const prestigeBtn = document.getElementById('btn-trigger-prestige');
            if (prestigeBtn && hasEnough) {
                prestigeBtn.addEventListener('click', executePrestige);
            }
        }

        // --- DYNAMIC CARD STATE HANDLER (Smooth frame state transitions) ---
        function updateDynamicUIStates() {
            if (activeTab === 'businesses') {
                let needsRebuild = false;
                businesses.forEach((biz, index) => {
                    const isUnlocked = biz.count > 0 || money >= (biz.baseCost * 0.5) || index === 0;
                    if (isUnlocked !== unlockedStates[index]) {
                        needsRebuild = true;
                    }
                });
                if (needsRebuild) {
                    renderListStructure();
                    return;
                }

                businesses.forEach((biz, index) => {
                    const card = document.getElementById(`biz-card-${index}`);
                    if (!card || card.tagName.toLowerCase() === 'div') return; 

                    const cost = tradeMode === 'buy' 
                        ? calculateBulkCost(biz.baseCost, biz.count, tradeAmount)
                        : calculateBulkRefund(biz.baseCost, biz.count, tradeAmount);

                    const canTrade = tradeMode === 'buy' ? money >= cost : biz.count >= tradeAmount;

                    const costEl = document.getElementById(`biz-cost-${index}`);
                    if (costEl) {
                        costEl.innerText = `${tradeMode === 'buy' ? '-' : '+'}${formatMoney(cost)}`;
                        costEl.className = canTrade 
                            ? `font-mono font-bold ${tradeMode === 'buy' ? 'text-emerald-400' : 'text-amber-400'}`
                            : 'font-mono font-bold text-red-400/80';
                    }

                    card.className = canTrade 
                        ? 'w-full text-left p-4 rounded-2xl border transition-all duration-150 active:scale-[0.98] flex items-center gap-4 select-none bg-slate-800/80 hover:bg-slate-700 hover:border-slate-500 border-slate-700 cursor-pointer shadow-lg' 
                        : 'w-full text-left p-4 rounded-2xl border transition-all duration-150 active:scale-[0.98] flex items-center gap-4 select-none bg-slate-900/40 border-slate-800 opacity-40 cursor-default';

                    const iconWrap = document.getElementById(`biz-icon-wrap-${index}`);
                    if (iconWrap) {
                        iconWrap.className = `w-14 h-14 rounded-xl flex items-center justify-center shadow-inner pointer-events-none ${canTrade ? 'bg-slate-900/80' : 'bg-slate-950'}`;
                    }

                    const titleEl = card.querySelector('h3');
                    if (titleEl) {
                        titleEl.className = `font-bold text-base ${canTrade ? 'text-slate-100' : 'text-slate-400'}`;
                    }
                });
            } else if (activeTab === 'upgrades') {
                let needsRebuild = false;
                upgrades.forEach((upg, index) => {
                    if (!upg.bought) {
                        const isVisible = money >= (upg.cost * 0.2);
                        const cardExists = document.getElementById(`upg-card-${index}`);
                        if (isVisible && !cardExists) {
                            needsRebuild = true;
                        }
                    }
                });
                if (needsRebuild) {
                    renderListStructure();
                    return;
                }

                upgrades.forEach((upg, index) => {
                    const card = document.getElementById(`upg-card-${index}`);
                    if (!card) return;

                    const canAfford = money >= upg.cost;

                    const costEl = document.getElementById(`upg-cost-${index}`);
                    if (costEl) {
                        costEl.className = canAfford 
                            ? 'font-mono font-bold text-sm bg-slate-950/50 px-2 py-1 rounded inline-block text-amber-400' 
                            : 'font-mono font-bold text-sm bg-slate-950/50 px-2 py-1 rounded inline-block text-red-400/80';
                    }

                    card.className = canAfford 
                        ? 'w-full text-left p-4 rounded-2xl border transition-all duration-150 active:scale-[0.98] flex items-center gap-4 select-none bg-slate-800/80 hover:bg-slate-700 border-slate-600 hover:border-emerald-500/50 cursor-pointer shadow-lg' 
                        : 'w-full text-left p-4 rounded-2xl border transition-all duration-150 active:scale-[0.98] flex items-center gap-4 select-none bg-slate-900/40 border-slate-800 opacity-40 cursor-default';

                    const iconWrap = document.getElementById(`upg-icon-wrap-${index}`);
                    if (iconWrap) {
                        iconWrap.className = `w-12 h-12 rounded-full flex items-center justify-center pointer-events-none ${canAfford ? 'bg-gradient-to-br from-slate-700 to-slate-800 shadow-inner' : 'bg-slate-900'}`;
                        const svgEl = iconWrap.querySelector('svg');
                        if (svgEl) {
                            svgEl.className = `w-6 h-6 ${canAfford ? 'text-amber-400' : 'text-slate-600'} pointer-events-none`;
                        }
                    }

                    const titleEl = card.querySelector('h3');
                    if (titleEl) {
                        titleEl.className = `font-bold ${canAfford ? 'text-white' : 'text-slate-400'}`;
                    }
                });
            }
        }

        // --- ACHIEVEMENTS RENDER DASHBOARD ---
        function renderAchievementsList() {
            const listContainer = document.getElementById('achievements-list-container');
            listContainer.innerHTML = '';

            const filtered = currentAchFilter === 'all' 
                ? achievementsList 
                : achievementsList.filter(a => a.cat === currentAchFilter);

            filtered.forEach(ach => {
                const card = document.createElement('div');
                card.className = `p-4 rounded-2xl flex items-center gap-4 border select-none transition-all ${
                    ach.unlocked 
                        ? 'bg-slate-800/80 border-amber-500/30 shadow-lg shadow-amber-500/5' 
                        : 'bg-slate-950/40 border-slate-850 opacity-50'
                }`;

                card.innerHTML = `
                    <div class="w-12 h-12 rounded-xl flex items-center justify-center text-2xl bg-slate-900/80 shadow-inner border border-slate-800">
                        ${ach.unlocked ? ach.icon : '🔒'}
                    </div>
                    <div class="flex-1">
                        <h4 class="font-bold text-sm ${ach.unlocked ? 'text-amber-400' : 'text-slate-400'}">${ach.name}</h4>
                        <p class="text-xs text-slate-300 mt-0.5 leading-tight">${ach.desc}</p>
                    </div>
                    <div class="text-right">
                        ${ach.unlocked 
                            ? '<span class="text-[10px] bg-amber-500/20 text-amber-400 px-2 py-1 rounded-md font-black tracking-wider uppercase">Unlocked</span>' 
                            : '<span class="text-[10px] bg-slate-900 text-slate-600 px-2 py-1 rounded-md font-bold uppercase">Locked</span>'
                        }
                    </div>
                `;

                listContainer.appendChild(card);
            });
        }

        // Setup filter button interactions inside achievements modal
        const catButtons = document.querySelectorAll('[data-ach-cat]');
        catButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                catButtons.forEach(b => b.className = "px-3 py-1.5 rounded-lg text-xs font-extrabold whitespace-nowrap transition-all text-slate-400 hover:text-slate-200");
                btn.className = "px-3 py-1.5 rounded-lg text-xs font-extrabold whitespace-nowrap transition-all bg-amber-500/20 text-amber-400 border border-amber-500/30";
                currentAchFilter = btn.getAttribute('data-ach-cat');
                renderAchievementsList();
            });
        });

        // --- CLICK EVENTS INTERACTION DELEGATION ---
        listContainer.addEventListener('click', (e) => {
            const btn = e.target.closest('[data-action]');
            if (!btn) return;

            const action = btn.getAttribute('data-action');
            const index = parseInt(btn.getAttribute('data-index'), 10);
            const value = btn.getAttribute('data-value');

            if (action === 'trade') {
                tradeBusiness(index);
            } else if (action === 'upgrade') {
                buyUpgrade(index);
            } else if (action === 'set-mode') {
                setTradeMode(value);
            } else if (action === 'set-amount') {
                setTradeAmount(parseInt(value, 10));
            }
        });

        function setTradeMode(mode) {
            tradeMode = mode;
            renderListStructure();
        }

        function setTradeAmount(amount) {
            tradeAmount = amount;
            renderListStructure();
        }

        function tradeBusiness(index) {
            const biz = businesses[index];
            if (tradeMode === 'buy') {
                const cost = calculateBulkCost(biz.baseCost, biz.count, tradeAmount);
                if (money >= cost) {
                    money -= cost;
                    biz.count += tradeAmount;
                    renderListStructure(); 
                } else {
                    triggerNudgeEffect();
                }
            } else {
                if (biz.count >= tradeAmount) {
                    const refund = calculateBulkRefund(biz.baseCost, biz.count, tradeAmount);
                    money += refund;
                    biz.count -= tradeAmount;
                    renderListStructure();
                } else {
                    triggerNudgeEffect();
                }
            }
        }

        function buyUpgrade(index) {
            const upg = upgrades[index];
            if (money >= upg.cost && !upg.bought) {
                money -= upg.cost;
                upg.bought = true;
                renderListStructure();
            } else if (money < upg.cost) {
                triggerNudgeEffect();
            }
        }

        function triggerNudgeEffect() {
            const element = document.getElementById('display-money');
            element.classList.add('text-red-400');
            setTimeout(() => {
                element.classList.remove('text-red-400');
            }, 250);
        }

        // --- THE BIG CLICKER ACTION ---
        const clickerButton = document.getElementById('clicker-button');
        const floatingContainer = document.getElementById('floating-container');

        clickerButton.addEventListener('click', (e) => {
            const multipliers = getGameMultipliers();
            money += multipliers.clickValue;
            totalEarned += multipliers.clickValue;

            // Stats update
            statTotalClicks++;
            statConsecutiveNoBreaks++;
            lastClickTime = Date.now();

            // Track clicks array
            clickTimestamps.push(Date.now());
            // Filter timestamps older than 5 seconds
            clickTimestamps = clickTimestamps.filter(t => Date.now() - t < 5000);

            // Manual Clicks Achievement evaluations
            triggerAchievement('c1'); // First Click
            if (statTotalClicks >= 100) triggerAchievement('c2');
            if (statTotalClicks >= 500) triggerAchievement('f2');
            if (statTotalClicks >= 1000) triggerAchievement('c3');
            if (statTotalClicks >= 10000) triggerAchievement('c4');
            if (statTotalClicks >= 100000) triggerAchievement('c5');
            if (statTotalClicks >= 1000000) triggerAchievement('c6');

            // Streak/Speed click checkers
            const clickRate10s = clickTimestamps.filter(t => Date.now() - t < 10000).length;
            if (clickRate10s >= 30) triggerAchievement('f1'); // Clicked Too Hard

            if (statConsecutiveNoBreaks >= 150) {
                triggerAchievement('s3'); // No Breaks
            }

            // Float Click Number Feedback
            const rect = clickerButton.getBoundingClientRect();
            const x = e.clientX - rect.left + (Math.random() * 40 - 20);
            const y = e.clientY - rect.top + (Math.random() * 40 - 20);

            createFloatingText(x, y, `+$${formatMoney(multipliers.clickValue).replace('$','')}`);
        });

        function createFloatingText(x, y, textString) {
            const floatDiv = document.createElement('div');
            floatDiv.className = "absolute animate-float text-xl md:text-2xl font-black text-emerald-400 drop-shadow-[0_2px_4px_rgba(0,0,0,0.8)] pointer-events-none select-none z-50 whitespace-nowrap";
            floatDiv.style.left = `${x}px`;
            floatDiv.style.top = `${y}px`;
            floatDiv.innerText = textString;
            
            floatingContainer.appendChild(floatDiv);

            setTimeout(() => {
                floatDiv.remove();
            }, 1000);
        }

        // --- EASTER EGG HUNTER ACTIVATION ---
        const devSecretBtn = document.getElementById('dev-secret-egg');
        devSecretBtn.addEventListener('click', () => {
            triggerAchievement('se4'); // Easter Egg Hunter
            
            // Random jokes list (safe & wholesome for kids/all ages)
            const motivationJokes = [
                "Why don't scientists trust atoms? Because they make up everything!",
                "What did the direct investment banker say to the lazy startup? Direct your capital assets elsewhere!",
                "Why did the computer go to the dentist? Because it had a bad drive byte!",
                "Why did the entrepreneur open a shoe shining stand next to the bank? She wanted clean steps to wealth!"
            ];
            const chosenJoke = motivationJokes[Math.floor(Math.random() * motivationJokes.length)];
            
            // Trigger motivational developer joke achievement
            triggerAchievement('se5'); 

            showUnlockToast("🎭 Developer Motivation Joke", chosenJoke);
        });

        // --- TAB NAVIGATION SWITCHING ---
        const tabAssets = document.getElementById('tab-assets');
        const tabUpgrades = document.getElementById('tab-upgrades');
        const tabPrestige = document.getElementById('tab-prestige');

        let tabSwitchesLastPeriod = 0;
        function handleTabSwitch() {
            tabSwitchesLastPeriod++;
            if (tabSwitchesLastPeriod >= 15) {
                triggerAchievement('se3'); // Wrong Place, Right Time
            }
            setTimeout(() => {
                tabSwitchesLastPeriod = Math.max(0, tabSwitchesLastPeriod - 1);
            }, 30000);
        }

        tabAssets.addEventListener('click', () => {
            activeTab = 'businesses';
            tabAssets.className = "flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-2 bg-slate-800 text-white shadow-md border border-slate-700";
            tabUpgrades.className = "flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 relative";
            tabPrestige.className = "py-3 px-4 rounded-xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-1.5 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 relative";
            handleTabSwitch();
            renderListStructure();
        });

        tabUpgrades.addEventListener('click', () => {
            activeTab = 'upgrades';
            tabUpgrades.className = "flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-2 bg-slate-800 text-white shadow-md border border-slate-700 relative";
            tabAssets.className = "flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50";
            tabPrestige.className = "py-3 px-4 rounded-xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-1.5 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 relative";
            handleTabSwitch();
            renderListStructure();
        });

        tabPrestige.addEventListener('click', () => {
            activeTab = 'prestige';
            tabPrestige.className = "py-3 px-4 rounded-xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-1.5 bg-slate-800 text-white shadow-md border border-slate-700 relative";
            tabAssets.className = "flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50";
            tabUpgrades.className = "flex-1 py-3 px-4 rounded-xl font-bold text-sm transition-all duration-200 flex items-center justify-center gap-2 text-slate-400 hover:text-slate-200 hover:bg-slate-800/50 relative";
            handleTabSwitch();
            renderListStructure();
        });

        // --- MUSIC TOGGLE HANDLER ---
        const btnMusicToggle = document.getElementById('btn-music-toggle');
        const musicIcon = document.getElementById('music-icon');
        const musicText = document.getElementById('music-text');

        btnMusicToggle.addEventListener('click', () => {
            if (!musicPlaying) {
                startMusic();
                musicIcon.innerText = "🔊";
                musicText.innerText = "Music On";
                btnMusicToggle.className = "px-3 py-1.5 rounded-lg bg-sky-500/20 hover:bg-sky-500/30 text-xs font-bold border border-sky-500/30 flex items-center gap-1.5 transition-all active:scale-95 text-sky-400";
            } else {
                stopMusic();
                musicIcon.innerText = "🔇";
                musicText.innerText = "Music Off";
                btnMusicToggle.className = "px-3 py-1.5 rounded-lg bg-slate-800/80 hover:bg-slate-700 text-xs font-bold border border-slate-700 flex items-center gap-1.5 transition-all active:scale-95 text-sky-400 hover:text-sky-300";
            }
        });

        // --- ACHIEVEMENTS OVERLAY TRIGGERS ---
        const btnAchievements = document.getElementById('btn-achievements');
        const modalAchievements = document.getElementById('achievements-modal');
        const closeAchievements = document.getElementById('close-achievements');

        let achievementOpenCount = 0;

        btnAchievements.addEventListener('click', () => {
            modalAchievements.classList.remove('hidden');
            achievementOpenCount++;
            if (achievementOpenCount >= 5) {
                triggerAchievement('f5'); // Definitely Not Addicted
            }
            updateAchievementHeaderProgress();
            renderAchievementsList();
        });

        closeAchievements.addEventListener('click', () => {
            modalAchievements.classList.add('hidden');
        });

        // Render structure first, then initialize gameLoop
        updateAchievementHeaderProgress();
        renderListStructure();
        gameLoop();
    </script>
